<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <rect width="500" height="500" rx="60" fill="#7c3aed"/>
  <!-- Globe -->
  <circle cx="240" cy="210" r="110" fill="none" stroke="#ffffff" stroke-width="16"/>
  <!-- Globe horizontal lines -->
  <ellipse cx="240" cy="210" rx="110" ry="40" fill="none" stroke="#ffffff" stroke-width="10"/>
  <!-- Globe vertical meridian -->
  <ellipse cx="240" cy="210" rx="45" ry="110" fill="none" stroke="#ffffff" stroke-width="10"/>
  <!-- Vertical line -->
  <line x1="240" y1="100" x2="240" y2="320" stroke="#ffffff" stroke-width="10"/>
  <!-- Horizontal line -->
  <line x1="130" y1="210" x2="350" y2="210" stroke="#ffffff" stroke-width="10"/>
  <!-- Location pin -->
  <g transform="translate(340,280)">
    <path d="M0,-45 C-25,-45 -40,-25 -40,0 C-40,25 0,55 0,55 C0,55 40,25 40,0 C40,-25 25,-45 0,-45Z" fill="#7c3aed" stroke="#ffffff" stroke-width="12"/>
    <circle cx="0" cy="-2" r="12" fill="#ffffff"/>
  </g>
  <text x="250" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="48" fill="#ffffff">IP GEO</text>
</svg>